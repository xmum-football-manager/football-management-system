<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 16px; }
  canvas { max-width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function renderPDF() {
  const response = await fetch('uploads/exceed-design.pdf');
  const arrayBuffer = await response.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    document.body.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }
}
renderPDF();
</script>
</body>
</html>
