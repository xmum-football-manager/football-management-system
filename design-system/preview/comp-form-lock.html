<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--ink-200); display: inline-flex; align-items: center; gap: 6px; }
  .field input { background: var(--ink-800); border: 1.5px solid var(--ink-700); color: var(--ink-50); padding: 12px 14px; border-radius: 12px; font-family: var(--font-sans); font-size: 14px; }
  .field input:focus { outline: none; border-color: var(--brand-lime); box-shadow: 0 0 0 4px rgba(163,230,53,0.18); }
  .field.locked input { background: var(--ink-800); color: var(--ink-400); border-color: var(--ink-700); border-style: dashed; }
  .help { font-size: 12px; color: var(--ink-400); display: inline-flex; align-items: center; gap: 4px; }
  .lock { color: var(--ink-400); }
</style></head>
<body><div class="wrap">
  <div class="field">
    <label>Tournament name</label>
    <input value="Eastside University Cup"/>
  </div>
  <div class="field locked">
    <label><span class="lock">🔒</span>Format</label>
    <input value="Round robin + knockout" readonly/>
    <span class="help">Locked — first match has been scheduled.</span>
  </div>
</div></body></html>
