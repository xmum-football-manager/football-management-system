<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); }
  .chip { padding: 8px 14px; background: var(--ink-800); border: 1px solid var(--ink-700); border-radius: 999px; font-family: var(--font-display); font-weight: 800; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-300); cursor: pointer; }
  .chip.active { background: var(--brand-lime); border-color: var(--brand-lime); color: var(--ink-900); }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .b-setup { background: rgba(56,189,248,0.12); border: 1px solid rgba(56,189,248,0.4); color: #7DD3FC; }
  .b-active { background: rgba(163,230,53,0.12); border: 1px solid rgba(163,230,53,0.45); color: var(--brand-lime); }
  .b-finished { background: var(--ink-800); border: 1px solid var(--ink-700); color: var(--ink-300); }
  .b-archived { background: var(--ink-800); border: 1px dashed var(--ink-600); color: var(--ink-400); }
  .b-live { background: rgba(220,38,38,0.16); border: 1px solid rgba(220,38,38,0.4); color: #FCA5A5; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  @keyframes pp { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.55); } 50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); } }
  .b-live .dot { background: #DC2626; animation: pp 1.6s infinite; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Filter chips</div>
  <div class="row">
    <span class="chip active">All</span>
    <span class="chip">Live now</span>
    <span class="chip">Upcoming</span>
    <span class="chip">Full time</span>
    <span class="chip">Today</span>
  </div>
  <div class="lbl">Status badges</div>
  <div class="row">
    <span class="badge b-setup">Setup</span>
    <span class="badge b-active">Active</span>
    <span class="badge b-finished">Finished</span>
    <span class="badge b-archived">Archived</span>
    <span class="badge b-live"><span class="dot"></span>Live · 67'</span>
  </div>
</div></body></html>
