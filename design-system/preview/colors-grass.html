<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw { height: 72px; border-radius: 8px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; }
  .sw .num { font-family: var(--font-display); font-weight: 900; font-size: 12px; color: rgba(255,255,255,0.95); letter-spacing: 0.04em; }
  .sw .hex { font-family: var(--font-mono); font-size: 8.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  .sw.on-light .num { color: var(--ink-900); }
  .sw.on-light .hex { color: var(--ink-700); }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 10px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Grass scale · 50 → 900</div>
  <div class="row">
    <div class="sw on-light" style="background:#ECFCCB"><div class="num">50</div><div class="hex">ECFCCB</div></div>
    <div class="sw on-light" style="background:#D9F99D"><div class="num">100</div><div class="hex">D9F99D</div></div>
    <div class="sw on-light" style="background:#BEF264"><div class="num">200</div><div class="hex">BEF264</div></div>
    <div class="sw on-light" style="background:#A3E635"><div class="num">300</div><div class="hex">A3E635</div></div>
    <div class="sw on-light" style="background:#84CC16"><div class="num">400</div><div class="hex">84CC16</div></div>
    <div class="sw" style="background:#65A30D"><div class="num">500</div><div class="hex">65A30D</div></div>
    <div class="sw" style="background:#4D7C0F"><div class="num">600</div><div class="hex">4D7C0F</div></div>
    <div class="sw" style="background:#3F6212"><div class="num">700</div><div class="hex">3F6212</div></div>
    <div class="sw" style="background:#2A4314"><div class="num">800</div><div class="hex">2A4314</div></div>
    <div class="sw" style="background:#14250A"><div class="num">900</div><div class="hex">14250A</div></div>
  </div>
</div></body></html>
