<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #FAFBF5; color: var(--ink-900); font-family: var(--font-sans); }
  .wrap { padding: 24px 22px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: end; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .card { background: #fff; border-radius: 14px; width: 100%; height: 80px; }
  .sm { box-shadow: 0 1px 2px rgba(14, 26, 18, 0.08); }
  .md { box-shadow: 0 4px 12px rgba(14, 26, 18, 0.10), 0 1px 2px rgba(14, 26, 18, 0.06); }
  .lg { box-shadow: 0 12px 32px rgba(14, 26, 18, 0.18), 0 2px 6px rgba(14, 26, 18, 0.08); }
  .glow { background: var(--brand-lime); box-shadow: 0 0 0 4px rgba(163, 230, 53, 0.32); }
  .press { background: #fff; box-shadow: inset 0 2px 0 rgba(14, 26, 18, 0.18); }
  .meta { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-500); }
</style></head>
<body><div class="wrap">
  <div class="item"><div class="card sm"></div><span class="meta">sm</span></div>
  <div class="item"><div class="card md"></div><span class="meta">md</span></div>
  <div class="item"><div class="card lg"></div><span class="meta">lg</span></div>
  <div class="item"><div class="card glow"></div><span class="meta">Glow / focus</span></div>
  <div class="item"><div class="card press"></div><span class="meta">Press inset</span></div>
</div></body></html>
