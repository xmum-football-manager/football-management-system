<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { position: relative; background: var(--ink-800); border: 1px solid var(--ink-700); border-radius: 18px; padding: 16px 18px; overflow: hidden; }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .card.live::before { background: #DC2626; }
  .card.live { border-color: rgba(220,38,38,0.4); }
  .card.up::before { background: var(--brand-lime); }
  .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .status { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .status.live { color: #FCA5A5; display: inline-flex; align-items: center; gap: 6px; }
  .status.up { color: var(--brand-lime); }
  .grp { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); }
  @keyframes pp { 0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.55); } 50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); } }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: #DC2626; animation: pp 1.6s infinite; }
  .row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; padding: 4px 0; }
  .row + .row { border-top: 1px dashed var(--ink-700); padding-top: 7px; }
  .team { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .crest { width: 22px; height: 22px; border-radius: 999px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-weight: 900; font-size: 9px; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.1); }
  .nm { font-weight: 700; font-size: 13px; color: var(--ink-50); }
  .nm.dim { color: var(--ink-400); }
  .sc { font-family: var(--font-display); font-weight: 900; font-size: 18px; font-variant-numeric: tabular-nums; color: var(--ink-50); }
  .sc.dim { color: var(--ink-400); }
</style></head>
<body><div class="wrap">
  <div class="card live">
    <div class="head"><span class="status live"><span class="dot"></span>Live · 67'</span><span class="grp">Group A</span></div>
    <div class="row"><div class="team"><span class="crest" style="background:#DC2626">THU</span><span class="nm">Thunderhawks</span></div><span class="sc">2</span></div>
    <div class="row"><div class="team"><span class="crest" style="background:#F59E0B">BLZ</span><span class="nm dim">Blazers FC</span></div><span class="sc">1</span></div>
  </div>
  <div class="card up">
    <div class="head"><span class="status up">Upcoming · 16:30</span><span class="grp">Group A · QF</span></div>
    <div class="row"><div class="team"><span class="crest" style="background:#7C3AED">GRV</span><span class="nm">Grovers</span></div><span class="sc dim">—</span></div>
    <div class="row"><div class="team"><span class="crest" style="background:#F59E0B">BLZ</span><span class="nm">Blazers FC</span></div><span class="sc dim">—</span></div>
  </div>
</div></body></html>
