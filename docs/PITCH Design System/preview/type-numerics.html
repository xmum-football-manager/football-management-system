<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: center; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 8px; grid-column: 1 / -1; }
  .clock { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 999px; background: var(--ink-800); border: 1px solid var(--ink-700); font-family: var(--font-mono); font-weight: 600; font-size: 14px; color: var(--ink-50); letter-spacing: 0.04em; }
  .period { color: var(--brand-lime); font-weight: 700; }
  .ball { width: 14px; height: 14px; background: url(../assets/icon-ball.svg) center/contain no-repeat; }
  .scoreboard { font-family: var(--font-display); font-weight: 900; font-size: 96px; line-height: 0.85; letter-spacing: -0.05em; font-variant-numeric: tabular-nums; color: var(--ink-50); display: flex; align-items: baseline; gap: 24px; }
  .sep { color: var(--ink-600); font-size: 0.5em; align-self: center; font-weight: 800; }
  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat .v { font-family: var(--font-display); font-weight: 900; font-size: 32px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat .l { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-400); }
  .min { font-family: var(--font-mono); color: var(--brand-lime); font-weight: 700; font-size: 12px; }
  .row { display: flex; align-items: center; gap: 18px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Numerics · tabular-nums for every score, clock, stat</div>
  <div class="scoreboard"><span>2</span><span class="sep">–</span><span>1</span></div>
  <div style="display:flex;flex-direction:column;gap:10px;align-items:flex-start">
    <span class="clock"><span class="ball"></span><span class="period">2H</span><span>67:12</span></span>
    <div class="row">
      <div class="stat"><span class="v">10</span><span class="l">Pts</span></div>
      <div class="stat"><span class="v">+6</span><span class="l">GD</span></div>
      <div class="stat"><span class="v">9</span><span class="l">GF</span></div>
      <div class="stat"><span class="min">67'</span><span class="l">Minute</span></div>
    </div>
  </div>
</div></body></html>
