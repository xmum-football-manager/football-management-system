<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 22px; display: grid; grid-template-columns: 220px 1fr; gap: 18px; align-items: center; }
  .mark { background: var(--ink-800); border-radius: 14px; padding: 18px; display: flex; align-items: center; justify-content: center; }
  .mark img { width: 80px; height: 80px; }
  .word { background: var(--brand-lime); border-radius: 14px; padding: 18px; display: flex; align-items: center; justify-content: center; }
  .word img { width: 100%; max-height: 80px; }
</style></head>
<body><div class="wrap">
  <div class="mark"><img src="../assets/logo-mark.svg" alt="Pitch mark"/></div>
  <div class="word"><img src="../assets/logo-wordmark-dark.svg" alt="Pitch wordmark"/></div>
</div></body></html>
