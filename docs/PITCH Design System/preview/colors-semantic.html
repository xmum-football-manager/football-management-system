<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { height: 92px; border-radius: 12px; position: relative; padding: 12px 14px; display: flex; flex-direction: column; justify-content: space-between; }
  .sw .top { display: flex; align-items: center; gap: 8px; }
  .sw .dot { width: 14px; height: 14px; border-radius: 4px; }
  .sw .nm { font-family: var(--font-display); font-weight: 800; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .sw .hex { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 10px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Match event semantics</div>
  <div class="row">
    <div class="sw" style="background:#2A4314;border:1px solid #3F6212;color:#A3E635"><div class="top"><span class="dot" style="background:#A3E635"></span><span class="nm">Goal</span></div><div class="hex">#A3E635 / bg #2A4314</div></div>
    <div class="sw" style="background:#422006;border:1px solid #78350F;color:#F59E0B"><div class="top"><span class="dot" style="background:#F59E0B;border-radius:2px"></span><span class="nm">Yellow</span></div><div class="hex">#F59E0B / bg #422006</div></div>
    <div class="sw" style="background:#450A0A;border:1px solid #7F1D1D;color:#FCA5A5"><div class="top"><span class="dot" style="background:#DC2626;border-radius:2px"></span><span class="nm">Red card</span></div><div class="hex">#DC2626 / bg #450A0A</div></div>
    <div class="sw" style="background:#1C2419;border:1px solid #2E3729;color:#FB923C"><div class="top"><span class="dot" style="background:#FB923C"></span><span class="nm">Penalty</span></div><div class="hex">#FB923C</div></div>
    <div class="sw" style="background:#082F49;border:1px solid #0C4A6E;color:#7DD3FC"><div class="top"><span class="dot" style="background:#38BDF8"></span><span class="nm">Info</span></div><div class="hex">#38BDF8 / bg #082F49</div></div>
  </div>
</div></body></html>
