<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 22px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 18px; align-items: center; justify-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
  .item img, .item svg { width: 40px; height: 40px; }
  .item .nm { font-family: var(--font-display); font-weight: 800; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-300); }
  .item.bright .nm { color: var(--brand-lime); }
  /* Bright variant: ball uses currentColor for the sphere fill — drive it via color */
  .ball-bright { color: var(--brand-lime); }
</style></head>
<body><div class="wrap">
  <div class="item"><img src="../assets/icon-ball.svg" alt=""/><span class="nm">Ball / Goal</span></div>
  <div class="item bright">
    <svg viewBox="0 0 48 48" fill="none" class="ball-bright" aria-hidden="true">
      <circle cx="24" cy="24" r="20" fill="currentColor"></circle>
      <path d="M24 10 L32 16 L29 26 L19 26 L16 16 Z" fill="#0E1A12"></path>
      <path d="M10 24 L16 27 L16 36 L10 32 Z" fill="#0E1A12"></path>
      <path d="M38 24 L32 27 L32 36 L38 32 Z" fill="#0E1A12"></path>
      <path d="M19 36 L29 36 L26 44 L22 44 Z" fill="#0E1A12"></path>
    </svg>
    <span class="nm">Ball · Bright</span>
  </div>
  <div class="item"><img src="../assets/icon-jersey.svg" alt=""/><span class="nm">Jersey</span></div>
  <div class="item"><img src="../assets/icon-whistle.svg" alt=""/><span class="nm">Whistle</span></div>
  <div class="item"><img src="../assets/icon-trophy.svg" alt=""/><span class="nm">Trophy</span></div>
  <div class="item"><img src="../assets/icon-yellow-card.svg" alt=""/><span class="nm">Yellow</span></div>
  <div class="item"><img src="../assets/icon-red-card.svg" alt=""/><span class="nm">Red</span></div>
</div></body></html>
