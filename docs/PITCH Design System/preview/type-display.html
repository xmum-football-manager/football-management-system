<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: 84px 1fr; gap: 14px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed var(--ink-700); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); letter-spacing: 0.04em; }
  .specimen { font-family: var(--font-display); font-weight: 900; line-height: 0.95; letter-spacing: -0.02em; text-transform: uppercase; color: var(--ink-50); }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 8px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Display · Archivo Narrow 800/900</div>
  <div class="row"><div class="meta">H1 / 56</div><div class="specimen" style="font-size:54px">Eastside Cup</div></div>
  <div class="row"><div class="meta">H2 / 36</div><div class="specimen" style="font-size:34px">Group Stage</div></div>
  <div class="row"><div class="meta">Score / 96</div><div class="specimen" style="font-size:64px;font-variant-numeric:tabular-nums;letter-spacing:-0.05em;font-weight:900">2 <span style="color:var(--ink-600)">–</span> 1</div></div>
</div></body></html>
