<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 12px; }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .item { display: flex; align-items: center; gap: 14px; }
  .bar { background: var(--brand-lime); height: 14px; border-radius: 3px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); width: 60px; }
  .px { color: var(--ink-500); }
</style></head>
<body><div class="wrap">
  <div class="lbl">Spacing scale · 4px base</div>
  <div class="row">
    <div class="item"><span class="meta">space-1 <span class="px">4</span></span><span class="bar" style="width:4px"></span></div>
    <div class="item"><span class="meta">space-2 <span class="px">8</span></span><span class="bar" style="width:8px"></span></div>
    <div class="item"><span class="meta">space-3 <span class="px">12</span></span><span class="bar" style="width:12px"></span></div>
    <div class="item"><span class="meta">space-4 <span class="px">16</span></span><span class="bar" style="width:16px"></span></div>
    <div class="item"><span class="meta">space-6 <span class="px">24</span></span><span class="bar" style="width:24px"></span></div>
    <div class="item"><span class="meta">space-8 <span class="px">32</span></span><span class="bar" style="width:32px"></span></div>
    <div class="item"><span class="meta">space-12 <span class="px">48</span></span><span class="bar" style="width:48px"></span></div>
    <div class="item"><span class="meta">space-16 <span class="px">64</span></span><span class="bar" style="width:64px"></span></div>
    <div class="item"><span class="meta">space-20 <span class="px">80</span></span><span class="bar" style="width:80px"></span></div>
  </div>
</div></body></html>
