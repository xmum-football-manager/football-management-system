<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw { height: 72px; border-radius: 8px; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 9px; border: 1px solid transparent; }
  .sw.bordered { border-color: rgba(255,255,255,0.06); }
  .sw .num { font-family: var(--font-display); font-weight: 900; font-size: 12px; color: rgba(255,255,255,0.95); letter-spacing: 0.04em; }
  .sw .hex { font-family: var(--font-mono); font-size: 8.5px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  .sw.on-light .num { color: var(--ink-900); }
  .sw.on-light .hex { color: var(--ink-700); }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 10px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Pitch ink (neutrals) · 0 → 900</div>
  <div class="row">
    <div class="sw on-light bordered" style="background:#FFFFFF"><div class="num">0</div><div class="hex">FFFFFF</div></div>
    <div class="sw on-light bordered" style="background:#F4F7EE"><div class="num">50</div><div class="hex">F4F7EE</div></div>
    <div class="sw on-light bordered" style="background:#E6EBDF"><div class="num">100</div><div class="hex">E6EBDF</div></div>
    <div class="sw on-light" style="background:#C9D2BE"><div class="num">200</div><div class="hex">C9D2BE</div></div>
    <div class="sw on-light" style="background:#A2AE96"><div class="num">300</div><div class="hex">A2AE96</div></div>
    <div class="sw" style="background:#6F7A65"><div class="num">400</div><div class="hex">6F7A65</div></div>
    <div class="sw" style="background:#4A5443"><div class="num">500</div><div class="hex">4A5443</div></div>
    <div class="sw" style="background:#2E3729"><div class="num">600</div><div class="hex">2E3729</div></div>
    <div class="sw" style="background:#1C2419"><div class="num">700</div><div class="hex">1C2419</div></div>
    <div class="sw" style="background:#131A11"><div class="num">800</div><div class="hex">131A11</div></div>
    <div class="sw" style="background:#0E1A12"><div class="num">900</div><div class="hex">0E1A12</div></div>
  </div>
</div></body></html>
