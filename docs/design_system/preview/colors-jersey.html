<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .crest { width: 56px; height: 56px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-weight: 900; font-size: 14px; box-shadow: inset 0 0 0 3px rgba(255,255,255,0.12); letter-spacing: -0.02em; }
  .item .nm { font-family: var(--font-display); font-weight: 800; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-300); }
  .item .hex { font-family: var(--font-mono); font-size: 9px; color: var(--ink-400); }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 12px; }
</style></head>
<body><div class="wrap">
  <div class="lbl">Team jersey palette · 8 swatches</div>
  <div class="row">
    <div class="item"><span class="crest" style="background:#DC2626">THU</span><span class="nm">Red</span><span class="hex">DC2626</span></div>
    <div class="item"><span class="crest" style="background:#2563EB">NRT</span><span class="nm">Blue</span><span class="hex">2563EB</span></div>
    <div class="item"><span class="crest" style="background:#F59E0B">BLZ</span><span class="nm">Amber</span><span class="hex">F59E0B</span></div>
    <div class="item"><span class="crest" style="background:#7C3AED">GRV</span><span class="nm">Purple</span><span class="hex">7C3AED</span></div>
    <div class="item"><span class="crest" style="background:#0891B2">KNG</span><span class="nm">Cyan</span><span class="hex">0891B2</span></div>
    <div class="item"><span class="crest" style="background:#DB2777">OAK</span><span class="nm">Pink</span><span class="hex">DB2777</span></div>
    <div class="item"><span class="crest" style="background:#FFFFFF;color:#0E1A12">RIV</span><span class="nm">White</span><span class="hex">FFFFFF</span></div>
    <div class="item"><span class="crest" style="background:#18181B">HRB</span><span class="nm">Black</span><span class="hex">18181B</span></div>
  </div>
</div></body></html>
