<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  table { width: 100%; border-collapse: collapse; }
  thead th { text-align: right; padding: 8px 6px; font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-400); border-bottom: 1px solid var(--ink-700); }
  thead th:nth-child(1), thead th:nth-child(2) { text-align: left; }
  tbody td { padding: 9px 6px; font-family: var(--font-sans); font-variant-numeric: tabular-nums; font-size: 13px; text-align: right; border-bottom: 1px solid var(--ink-700); }
  td:first-child { text-align: left; padding-left: 4px; width: 28px; }
  td:nth-child(2) { text-align: left; }
  tbody tr:last-child td { border-bottom: 0; }
  tr.q { background: linear-gradient(90deg, rgba(163,230,53,0.08), transparent 60%); }
  .rank { font-family: var(--font-display); font-weight: 900; font-size: 14px; color: var(--ink-400); }
  tr.q .rank { color: var(--brand-lime); }
  .team { display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--ink-50); }
  .crest { width: 20px; height: 20px; border-radius: 999px; font-family: var(--font-display); font-weight: 900; font-size: 8px; display: inline-flex; align-items: center; justify-content: center; color: #fff; }
  .pts { font-family: var(--font-display); font-weight: 900; font-size: 16px; color: var(--ink-50); }
  tr.q .pts { color: var(--brand-lime); }
</style></head>
<body><div class="wrap">
  <table>
    <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
    <tbody>
      <tr class="q"><td><span class="rank">1</span></td><td><div class="team"><span class="crest" style="background:#DC2626">THU</span>Thunderhawks</div></td><td>4</td><td>3</td><td>1</td><td>0</td><td>+6</td><td><span class="pts">10</span></td></tr>
      <tr class="q"><td><span class="rank">2</span></td><td><div class="team"><span class="crest" style="background:#7C3AED">GRV</span>Grovers</div></td><td>4</td><td>2</td><td>1</td><td>1</td><td>+3</td><td><span class="pts">7</span></td></tr>
      <tr><td><span class="rank">3</span></td><td><div class="team"><span class="crest" style="background:#F59E0B">BLZ</span>Blazers FC</div></td><td>4</td><td>2</td><td>0</td><td>2</td><td>0</td><td><span class="pts">6</span></td></tr>
      <tr><td><span class="rank">4</span></td><td><div class="team"><span class="crest" style="background:#2563EB">NRT</span>Northstars</div></td><td>4</td><td>0</td><td>0</td><td>4</td><td>−9</td><td><span class="pts">0</span></td></tr>
    </tbody>
  </table>
</div></body></html>
