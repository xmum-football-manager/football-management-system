<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: var(--ink-900); color: var(--ink-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: 90px 1fr; gap: 14px; align-items: baseline; padding: 7px 0; border-bottom: 1px dashed var(--ink-700); }
  .row:last-child { border-bottom: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); letter-spacing: 0.04em; }
  .lbl { font-family: var(--font-display); font-weight: 800; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-400); margin-bottom: 8px; }
  h3 { font-family: var(--font-sans); font-weight: 700; font-size: 22px; line-height: 1.1; margin: 0; color: var(--ink-50); }
  h4 { font-family: var(--font-sans); font-weight: 700; font-size: 18px; margin: 0; color: var(--ink-50); }
  .body { font-size: 16px; color: var(--ink-100); line-height: 1.45; }
  .small { font-size: 14px; color: var(--ink-200); }
  .micro { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: var(--brand-lime); }
</style></head>
<body><div class="wrap">
  <div class="lbl">Body · Archivo 400/600/700</div>
  <div class="row"><div class="meta">H3 / 22</div><h3>Schedule a match</h3></div>
  <div class="row"><div class="meta">H4 / 18</div><h4>Group A · Matchday 9</h4></div>
  <div class="row"><div class="meta">Body / 16</div><div class="body">Tournament is in <strong>Setup</strong>. It becomes <strong>Active</strong> when the first match goes live.</div></div>
  <div class="row"><div class="meta">Small / 14</div><div class="small">North Field · Ref M. Alvarez</div></div>
  <div class="row"><div class="meta">Micro / 12</div><div class="micro">Golden boot race</div></div>
</div></body></html>
